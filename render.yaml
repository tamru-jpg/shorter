services:
  - type: web
    name: shortener
    runtime: python
    repo: https://github.com/ВАШ_АККАУНТ/ВАШ_РЕПОЗИТОРИЙ
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shortener_db
          property: connectionString

databases:
  - name: shortener_db
    plan: free