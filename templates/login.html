{% extends "base.html" %}

{% block content %}

<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/reg.css') }}">

</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">Авторизация</h1>
        <p class="auth-subtitle">Войдите в аккаунт</p>

        <form action="" method="post">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="example@mail.ru" required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="form-check">
                <input type="checkbox" id="remember_me" name="remember_me" class="checkbox">
                <label for="remember_me" class="checkbox-label">Запомнить меня</label>
            </div>

            <button type="submit" class="submit-btn mb-4">Войти</button>

        </form>
    </div>
</div>
</body>

</html>

{% endblock %}
