{% extends "base.html" %}

{% block content %}

<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reg.css') }}">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">Регистрация</h1>
        <p class="auth-subtitle">Создайте свой аккаунт в SHORTENER</p>

        <form action="{{ url_for('auth.register') }}" method="post" novalidate id="registerForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">

            <div class="form-group">
                <label for="username" class="form-label">Имя пользователя</label>
                <input type="text"
                       class="form-control"
                       id="username"
                       name="username"
                       placeholder="Введите имя пользователя"
                       required>
                <div class="error-message" id="usernameError"></div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email"
                       class="form-control"
                       id="email"
                       name="email"
                       placeholder="example@mail.ru"
                       required>
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Пароль</label>
                <input type="password"
                       class="form-control"
                       id="password"
                       name="password"
                       placeholder="••••••••"
                       required>
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label for="password_check" class="form-label">Подтверждение пароля</label>
                <input type="password"
                       class="form-control"
                       id="password_check"
                       name="password_check"
                       placeholder="••••••••"
                       required>
                <div class="error-message" id="passwordCheckError"></div>
            </div>

            <div class="form-check">
                <input type="checkbox" class="checkbox" id="remember_me" name="remember_me">
                <label for="remember_me" class="checkbox-label">Запомнить меня</label>
            </div>

            <button type="submit" class="submit-btn">Зарегистрироваться</button>
        </form>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();

    // Clear previous errors
    document.querySelectorAll('.error-message').forEach(el => el.textContent = '');

    // Get values
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const passwordCheck = document.getElementById('password_check').value;

    let isValid = true;

    // Validate username
    if (!username) {
        document.getElementById('usernameError').textContent = 'Поле обязательно для заполнения';
        isValid = false;
    } else if (username.length < 3) {
        document.getElementById('usernameError').textContent = 'Имя пользователя должно содержать минимум 3 символа';
        isValid = false;
    }

    // Validate email
    if (!email) {
        document.getElementById('emailError').textContent = 'Поле обязательно для заполнения';
        isValid = false;
    } else if (!isValidEmail(email)) {
        document.getElementById('emailError').textContent = 'Введите корректный email адрес';
        isValid = false;
    }

    // Validate password
    if (!password) {
        document.getElementById('passwordError').textContent = 'Поле обязательно для заполнения';
        isValid = false;
    } else if (password.length < 6) {
        document.getElementById('passwordError').textContent = 'Пароль должен содержать минимум 6 символов';
        isValid = false;
    }

    // Validate password confirmation
    if (!passwordCheck) {
        document.getElementById('passwordCheckError').textContent = 'Поле обязательно для заполнения';
        isValid = false;
    } else if (password !== passwordCheck) {
        document.getElementById('passwordCheckError').textContent = 'Пароли не совпадают';
        isValid = false;
    }

    if (isValid) {
        this.submit();
    }
});

function isValidEmail(email) {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return emailRegex.test(email);
}

// Real-time validation
document.getElementById('username').addEventListener('input', function() {
    if (this.value.trim()) {
        document.getElementById('usernameError').textContent = '';
    }
});

document.getElementById('email').addEventListener('input', function() {
    if (this.value.trim() && isValidEmail(this.value.trim())) {
        document.getElementById('emailError').textContent = '';
    }
});

document.getElementById('password').addEventListener('input', function() {
    if (this.value) {
        document.getElementById('passwordError').textContent = '';
        // Check password match in real-time
        const passwordCheck = document.getElementById('password_check').value;
        if (passwordCheck && this.value !== passwordCheck) {
            document.getElementById('passwordCheckError').textContent = 'Пароли не совпадают';
        } else if (passwordCheck) {
            document.getElementById('passwordCheckError').textContent = '';
        }
    }
});

document.getElementById('password_check').addEventListener('input', function() {
    const password = document.getElementById('password').value;
    if (this.value && password !== this.value) {
        document.getElementById('passwordCheckError').textContent = 'Пароли не совпадают';
    } else {
        document.getElementById('passwordCheckError').textContent = '';
    }
});
</script>

</body>
</html>

{% endblock %}
